<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اولین چت‌بات من</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="chat-wrapper">
    <header>
      <span>اولین چت‌بات من / Taha</span>
      <button id="themeToggle">دارک / لایت</button>
    </header>

    <div class="chat-container" id="chat">
      <div class="message system">به اولین چت‌بات من خوش اومدی 👋</div>
    </div>

    <div class="chat-input">
      <input type="text" id="msg" placeholder="پیام خود را وارد کنید...">
      <button onclick="sendMessage()">ارسال</button>
    </div>
  </div>

<script src="./core.js"></script>
</body>
</html>
